<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><title>Manage Expenses - Expense Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav>
            <h2>WalletWatch</h2>
            <div>
                <span id="welcomeMsg" style="font-weight:600;">Welcome, User</span>
                <a href="dashboard.html">Dashboard</a>
                <a href="expenses.html" style="border-bottom: 2px solid;">Manage Expenses</a>
                <button class="logout-btn" onclick="handleLogout()" style="margin-left:20px;">Logout</button>
            </div>
        </nav>

        <div class="layout-split" style="grid-template-columns: 1fr 2fr;">
            <div class="card">
                <h3 id="formTitle">Log New Entry</h3>
                <form id="expenseForm" style="margin-top:15px;">
                    <input type="hidden" id="editExpenseId">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="expTitle" required placeholder="Grocery, Rent etc...">
                    </div>
                    <div class="form-group">
                        <label>Amount ($)</label>
                        <input type="number" step="0.01" id="expAmount" required min="0.01">
                    </div>
                    <div class="form-group">
                        <label>Category</label>
                        <select id="expCategory" required>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Date</label>
                        <input type="date" id="expDate" required>
                    </div>
                    <div class="form-group">
                        <label>Optional Note</label>
                        <input type="text" id="expNote">
                    </div>
                    <button type="submit" class="btn" id="saveBtn">Submit Expense</button>
                    <button type="button" class="btn" id="cancelEditBtn" style="background:#64748b; margin-top:8px; display:none;" onclick="resetExpenseForm()">Cancel Edit</button>
                </form>
            </div>

            <div>
                <div class="filter-bar">
                    <div class="form-group">
                        <label>Filter Category</label>
                        <select id="filterCategory">
                            <option value="">All Categories</option>
                            <option value="Food">Food</option>
                            <option value="Transport">Transport</option>
                            <option value="Shopping">Shopping</option>
                            <option value="Health">Health</option>
                            <option value="Education">Education</option>
                            <option value="Entertainment">Entertainment</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>From Date</label>
                        <input type="date" id="filterFrom">
                    </div>
                    <div class="form-group">
                        <label>To Date</label>
                        <input type="date" id="filterTo">
                    </div>
                    <button class="btn" onclick="applyFilters()" style="width:auto; padding:10px 20px;">Apply</button>
                    <button class="btn" onclick="clearFilters()" style="width:auto; padding:10px 20px; background:#64748b;">Clear</button>
                </div>

                <div class="card" style="overflow-x: auto;">
                    <h3>Personal Ledger Entries</h3>
                    <table>
                        <thead>
                            <tr><th>Title</th><th>Category</th><th>Amount</th><th>Date</th><th>Note</th><th>Actions</th></tr>
                        </thead>
                        <tbody id="ledgerTableBody"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    <script>document.addEventListener("DOMContentLoaded", loadLedgerView);</script>
</body>
</html>
